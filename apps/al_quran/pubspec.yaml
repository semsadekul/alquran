name: al_quran
description: "Al_Quran - A premium, ad-free Quran reading application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0

  # Routing
  go_router: ^14.8.0

  # Networking
  dio: ^5.7.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.5

  # Audio
  just_audio: ^0.9.43
  audio_service: ^0.18.16

  # UI & Theming
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utilities
  equatable: ^2.0.7
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  share_plus: ^7.2.2

  # Platform Features
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  home_widget: ^0.7.0+1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/fonts/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
